<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Mahjong</title>
    <!-- Google Font: Quicksand = Calm Vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 🧠 MENU SCREEN -->
    <div id="menu-screen" class="menu-screen">
        <div class="menu-box">
            <div class="logo">🀄</div>
            <h1>Calm Mahjong</h1>
            <p class="subtitle">Relaxing Tile Matching Puzzle</p>
            <div class="menu-buttons">
                <button class="btn-primary" onclick="newGame()">🎮 New Game</button>
                <button class="btn-secondary" onclick="continueGame()" id="continue-btn" style="display:none;">▶ Continue</button>
                <button class="btn-ghost" onclick="resetProgress()">♻ Reset Progress</button>
            </div>
        </div>
    </div>

    <!-- 🎮 GAME -->
    <div class="game-container" id="game-container" style="display:none;">
        <div class="game-header">
            <h1>Calm Mahjong</h1>
            <div class="info">
                <div class="stat"><span>Level</span><b id="level">1</b></div>
                <div class="stat"><span>Score</span><b id="score">0</b></div>
                <div class="stat"><span>Best</span><b id="best-score">0</b></div>
            </div>
        </div>

        <div id="game-board" class="board"></div>
        <div id="achievement-bar"></div>

        <div class="controls">
            <button class="btn-icon" onclick="restartGame()">🔄</button>
            <button class="btn-icon" onclick="hint()">💡</button>
            <button class="btn-icon" onclick="shuffleBoard()">🔀</button>
            <button class="btn-icon" onclick="resetProgress()">♻</button>
        </div>

        <div id="win-message" class="win-popup" style="display:none;"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
