<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Vita Killer Pro Max Ultimate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ========== DOOR ANIMATION - JS SE CONTROL ========== -->
    <div class="door-left"></div>
    <div class="door-right"></div>

    <!-- ========== MENU SCREEN ========== -->
    <div id="menu-screen">
        <h1 class="menu-title">VITA KILLER<br>PRO MAX ULTIMATE</h1>
        <div class="menu-buttons">
            <button class="btn-primary" onclick="newGame()">NEW GAME</button>
            <button class="btn-primary" id="continue-btn" onclick="continueGame()" style="display: none;">CONTINUE</button>
            <button class="btn-ghost" onclick="resetProgress()">RESET PROGRESS</button>
        </div>
        <p style="margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
            Match 3 Tiles to Crush | 100 Levels | 20 Min Each
        </p>
    </div>

    <!-- ========== GAME CONTAINER ========== -->
    <div id="game-container">
        
        <!-- ===== GAME HEADER - SS JESA ===== -->
        <header class="game-header">
            <div class="header-left">
                <div class="stat-box">
                    <span class="stat-label">LEVEL</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">SCORE</span>
                    <span class="stat-value" id="score">0</span>
                </div>
            </div>

            <div class="header-center">
                <div id="timer-display">⏱️ 20:00</div>
            </div>

            <div class="header-right">
                <div class="stat-box">
                    <span class="stat-label">BEST</span>
                    <span class="stat-value" id="best-score">0</span>
                </div>
            </div>
        </header>

        <!-- ===== GAME BOARD - 10x8 GRID ===== -->
        <main id="game-board"></main>

        <!-- ===== GAME FOOTER ===== -->
        <footer class="game-footer">
            <button class="footer-btn" onclick="hint()">💡 HINT</button>
            <button class="footer-btn" onclick="shuffleBoard()">🔄 SHUFFLE</button>
            <button class="footer-btn" onclick="restartGame()">🔃 RESTART</button>
            <button class="footer-btn" onclick="showMenu()">🏠 MENU</button>
        </footer>

    </div>

    <!-- ========== WIN/LOSE POPUP ========== -->
    <div id="win-message"></div>

    <!-- ========== JS LOAD - LAST MEIN ========== -->
    <script src="script.js"></script>
</body>
</html>
