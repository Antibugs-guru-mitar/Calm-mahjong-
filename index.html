<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Mahjong</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">

        <h1>Calm Mahjong</h1>

        <!-- 🧠 PHASE 6 ADD: GAME STATUS BAR -->
        <div class="info">
            <p>Level: <span id="level">1</span></p>
            <p>Score: <span id="score">0</span></p>
            <p>Best: <span id="best-score">0</span></p>
        </div>

        <!-- 🎮 GAME BOARD -->
        <div id="game-board" class="board"></div>

        <!-- 🧠 PHASE 6 ADD: ACHIEVEMENT DISPLAY -->
        <div id="achievement-bar" style="margin-top:10px; font-size:14px; color:green;"></div>

        <!-- CONTROLS (UNCHANGED + SAFE ADD) -->
        <div class="controls">

            <button onclick="startGame()">Start Game</button>
            <button onclick="restartGame()">Restart</button>

            <button onclick="hint()">💡 Hint</button>
            <button onclick="shuffleBoard()">🔀 Shuffle</button>
            <button onclick="resetProgress()">♻ Reset</button>

        </div>

        <!-- 🏆 WIN SCREEN (PHASE 6 READY) -->
        <div id="win-message" style="display:none;"></div>

        <!-- 🎮 PHASE 6 ADD: MENU OVERLAY (FUTURE READY) -->
        <div id="menu-screen" style="display:none;"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
