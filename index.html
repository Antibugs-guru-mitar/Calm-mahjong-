<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vita Snow Rider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <!-- RAASTA 2: BACKGROUND -->
        <div class="mountain" id="mtn2"></div>
        <div class="mountain" id="mtn1"></div>
        
        <!-- RAASTA 3: CHARACTER -->
        <div id="player">
            <div class="ninja-ribbon"></div>
            <div class="ninja-head"></div>
            <div class="ninja-body"></div>
            <div class="snowboard"></div>
        </div>
        
        <div id="ground"></div>
        
        <!-- RAASTA 1: UI -->
        <div id="score">0M</div>
        <div id="tap">TAP TO JUMP</div>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p>Distance: <span id="finalScore">0</span>M</p>
            <button id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
