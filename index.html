<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Mahjong</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🧠 MENU SCREEN -->
    <div id="menu-screen" class="menu-screen">

        <div class="menu-box">
            <h1>🀄 Calm Mahjong</h1>
            <p>Relaxing Tile Matching Puzzle</p>

            <div class="menu-buttons">
                <button onclick="newGame()">🎮 New Game</button>
                <button onclick="continueGame()">▶ Continue</button>
                <button onclick="resetProgress()">♻ Reset Progress</button>
            </div>
        </div>

    </div>

    <!-- 🎮 GAME -->
    <div class="game-container" id="game-container" style="display:none;">

        <h1>Calm Mahjong</h1>

        <div class="info">
            <p>Level: <span id="level">1</span></p>
            <p>Score: <span id="score">0</span></p>
            <p>Best: <span id="best-score">0</span></p>
        </div>

        <div id="game-board" class="board"></div>

        <div id="achievement-bar"></div>

        <div class="controls">
            <button onclick="restartGame()">🔄 Restart</button>
            <button onclick="hint()">💡 Hint</button>
            <button onclick="shuffleBoard()">🔀 Shuffle</button>
            <button onclick="resetProgress()">♻ Reset</button>
        </div>

        <div id="win-message" style="display:none;"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
